<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">

    <title>Charadas do Sócrates</title>
    <style>
        :root {
            --primary: #4f46e5;
            --secondary: #ec4899;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: var(--dark);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .game-card {
            background: white;
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 450px;
            text-align: center;
            position: relative;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        .timer-badge {
            background: var(--dark);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
        }

        .score-badge {
            color: var(--primary);
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.75rem; color: var(--dark); }

        .quote-container {
            background: #f3f4ff;
            color: #3730a3;
            padding: 1rem 1.2rem;
            margin-bottom: 1rem;
            border-radius: 16px;
            border: 1px solid rgba(99, 102, 241, 0.2);
            font-style: italic;
            min-height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .question-container {
            background: var(--light);
            padding: 1.5rem;
            border-radius: 16px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            margin-bottom: 1.5rem;
            border: 2px solid #e2e8f0;
        }

        input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .audio-control {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 12px;
            font-size: 0.95rem;
            color: #334155;
        }

        .audio-status {
            background: #f1f5f9;
            padding: 8px 12px;
            border-radius: 999px;
            border: 1px solid #cbd5e1;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-main { background: var(--primary); color: white; grid-column: span 2; }
        .btn-hint { background: #fef3c7; color: #92400e; }
        .btn-next { background: var(--dark); color: white; }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        #feedback {
            margin-top: 15px;
            font-weight: 600;
            height: 20px;
        }
    </style>
</head>

<div class="game-card">

    // Simulando 190 charadas extras com perguntas únicas
    for (let i = 1; i <= 190; i++) {
        riddles.push({
            q: `Charada extra ${i}: Qual é o céu que não tem estrelas?`,
            a: "ceu da boca"
        });
    }

    let currentRiddle = null;
    let previousRiddle = null;
    let score = 0;
    let timeLeft = 15;
    let timerInterval = null;
    let remainingRiddles = [];

    const questionEl = document.getElementById('question');
    const quoteEl = document.getElementById('quote');
    const inputEl = document.getElementById('answerInput');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const feedbackEl = document.getElementById('feedback');
    const bgmEl = document.getElementById('bgm');
    const soundToggleBtn = document.getElementById('soundToggleBtn');
    const audioStatus = document.getElementById('audioStatus');

    function shuffleArray(array) {
        const copy = array.slice();
        for (let i = copy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [copy[i], copy[j]] = [copy[j], copy[i]];
        }
        return copy;
    }

    function refillRiddles() {
        remainingRiddles = shuffleArray(riddles);
    }

    const quotes = [
        "Conhece-te a ti mesmo.",
        "Só sei que nada sei.",
        "A vida não examinada não vale a pena ser vivida.",
        "O verdadeiro conhecimento vem da reflexão.",
        "A educação é acender uma chama, não encher um vaso.",
        "O maior desafio é conhecer a si mesmo.",
        "A alegria nasce da virtude.",
        "A sabedoria começa na admiração.",
        "A medida do amor é amar sem medida.",
        "Seja lento para falar e rápido para agir."
    ];

    const audioContext = new (window.AudioContext || window.webkitAudioContext)();
    let quoteRotationTimer = null;

    function activateAudio() {
        if (!audioContext) return Promise.resolve(false);
        if (audioContext.state === 'running') return Promise.resolve(true);
        return audioContext.resume().then(() => true).catch(() => false);
    }

    document.body.addEventListener('click', () => activateAudio(), { once: true });

    function playTone(frequency, duration, type = 'sine', volume = 0.08) {
        if (!audioContext) return;
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();

        oscillator.type = type;
        oscillator.frequency.value = frequency;
        gainNode.gain.setValueAtTime(volume, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.0001, audioContext.currentTime + duration / 1000);

        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);

        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + duration / 1000);
    }

    function playCorrectSound() {
        activateAudio().then((ok) => {
            if (!ok) return;
            playTone(880, 120, 'triangle', 0.15);
            setTimeout(() => playTone(1047, 130, 'triangle', 0.12), 140);
            setTimeout(() => playTone(1319, 90, 'triangle', 0.1), 280);
        });
    }

    function playWrongSound() {
        activateAudio().then((ok) => {
            if (!ok) return;
            playTone(220, 180, 'sawtooth', 0.18);
            setTimeout(() => playTone(165, 180, 'sawtooth', 0.14), 220);
        });
    }

    function startBackgroundMusic() {
        activateAudio().then((ok) => {
            if (!ok || !bgmEl) return;
            bgmEl.volume = 0.22;
            bgmEl.muted = false;
            bgmEl.play().catch(() => {
                // Autoplay pode ser bloqueado, mas o usuário já interagiu com o botão de início.
            });
            updateSoundButton();
        });
    }

    function stopBackgroundMusic() {
        if (bgmEl && !bgmEl.paused) {
            bgmEl.pause();
        }
    }

    function toggleSound() {
        if (!bgmEl) return;
        if (bgmEl.paused) {
            startBackgroundMusic();
            audioStatus.innerText = 'Trilha ligada';
        } else {
            bgmEl.pause();
            audioStatus.innerText = 'Trilha pausada';
        }
        updateSoundButton();
    }

    function updateSoundButton() {
        if (!bgmEl) return;
        soundToggleBtn.innerText = bgmEl.paused ? '🔇 Ligar' : '🔊 Desligar';
        audioStatus.innerText = bgmEl.paused ? 'Trilha pausada' : 'Trilha ligada';
    }

    function rotateQuotes() {
        clearInterval(quoteRotationTimer);
        quoteRotationTimer = setInterval(updateQuote, 9000);
    }

    function updateQuote() {
        const quote = quotes[Math.floor(Math.random() * quotes.length)];
        quoteEl.innerText = `"${quote}" — Sócrates`;
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 15;
        timerEl.innerText = timeLeft + "s";
        timerEl.style.background = "var(--dark)";

        timerInterval = setInterval(() => {
            timeLeft--;
            timerEl.innerText = timeLeft + "s";
            if (timeLeft <= 5) timerEl.style.background = "var(--danger)";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameOver("Tempo esgotado!");
            }
        }, 1000);
    }

    function startGame() {
        score = 0;
        scoreEl.innerText = score;
        document.getElementById('startBtn').style.display = 'none';
        document.getElementById('hintBtn').disabled = false;
        document.getElementById('nextBtn').disabled = false;
        soundToggleBtn.disabled = false;
        updateSoundButton();
        updateQuote();
        rotateQuotes();
        refillRiddles();
        startBackgroundMusic();
        nextQuestion();
    }

    function nextQuestion() {
        if (remainingRiddles.length === 0) {
            refillRiddles();
        }

        inputEl.disabled = false;
        inputEl.value = "";
        inputEl.focus();
        feedbackEl.innerText = "";
        feedbackEl.style.color = "var(--dark)";

        updateQuote();
        let nextRiddle = remainingRiddles.pop();
        while (previousRiddle && nextRiddle && nextRiddle.q === previousRiddle.q && remainingRiddles.length > 0) {
            const tempRiddle = nextRiddle;
            nextRiddle = remainingRiddles.pop();
            remainingRiddles.unshift(tempRiddle);
        }

        currentRiddle = nextRiddle || remainingRiddles.pop();
        previousRiddle = currentRiddle;
        questionEl.innerText = currentRiddle.q;
        startTimer();
    }

    function checkAnswer() {
        const userVal = inputEl.value.toLowerCase().trim()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        const correctVal = currentRiddle.a.toLowerCase()
            .normalize("NFD").replace(/[\u0300-\u036f]/g, "");

        if (userVal === correctVal) {
            score += 10 + timeLeft;
            scoreEl.innerText = score;
            feedbackEl.innerText = "✨ Correto! + " + (10 + timeLeft) + " pts";
            feedbackEl.style.color = "var(--success)";
            clearInterval(timerInterval);
            playCorrectSound();
            setTimeout(nextQuestion, 1500);
        }
    }

    function gameOver(msg) {
        inputEl.disabled = true;
        feedbackEl.innerText = msg + " A resposta era: " + currentRiddle.a;
        feedbackEl.style.color = "var(--danger)";
        playWrongSound();
        setTimeout(nextQuestion, 3000);
    }

    function getHint() {
        feedbackEl.innerText = `Dica: Começa com "${currentRiddle.a[0].toUpperCase()}"`;
        feedbackEl.style.color = "#92400e";
        score = Math.max(0, score - 5);
        scoreEl.innerText = score;
    }

    inputEl.addEventListener('input', checkAnswer);
    inputEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
            event.preventDefault();
            checkAnswer();
        }
    });

    if (soundToggleBtn) {
        soundToggleBtn.disabled = true;
    }
